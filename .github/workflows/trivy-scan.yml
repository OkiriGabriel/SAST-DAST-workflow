name: "Trivy Image Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: |
          secure-webapp-lab:${{ github.sha }}
          secure-webapp-lab:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'secure-webapp-lab:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        vuln-type: 'os,library'
        scanners: 'vuln,secret,config'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy-container-scan'

    - name: Run Trivy vulnerability scanner (JSON output)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'secure-webapp-lab:${{ github.sha }}'
        format: 'json'
        output: 'trivy-results.json'
        severity: 'CRITICAL,HIGH,MEDIUM'
        vuln-type: 'os,library'
        scanners: 'vuln,secret,config'

    - name: Run Trivy vulnerability scanner (Table output)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'secure-webapp-lab:${{ github.sha }}'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        vuln-type: 'os,library'
        scanners: 'vuln,secret,config'

    - name: Upload Trivy scan results as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-scan-results
        path: |
          trivy-results.sarif
          trivy-results.json
        retention-days: 30

    - name: Check for CRITICAL vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'secure-webapp-lab:${{ github.sha }}'
        format: 'json'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL'
        vuln-type: 'os,library'

  trivy-config-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy configuration scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-config-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy config results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-config-results.sarif'
        category: 'trivy-config-scan'

    - name: Run Trivy configuration scanner (Table output)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload config scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-config-results
        path: trivy-config-results.sarif
        retention-days: 30

  trivy-filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH'
        scanners: 'vuln,secret,misconfig'

    - name: Upload Trivy filesystem results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: 'trivy-filesystem-scan'

    - name: Run Trivy filesystem scanner (Table output)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'
        scanners: 'vuln,secret,misconfig'

    - name: Upload filesystem scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-filesystem-results
        path: trivy-fs-results.sarif
        retention-days: 30